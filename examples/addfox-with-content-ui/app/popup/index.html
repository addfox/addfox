<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Addfox Popup</title>
  <script data-addfox-entry src="./index.ts"></script>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <img id="page-favicon" class="favicon" src="" alt="favicon">
      <div class="page-info">
        <div id="page-title" class="page-title">加载中...</div>
        <div id="page-url" class="page-url">-</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">状态</div>
      <span class="status-badge">扩展已启用</span>
    </div>

    <div class="section">
      <div class="section-title">操作</div>
      <div class="button-group">
        <button id="btn-toggle-ui" class="btn btn-primary">切换 Content UI</button>
        <button id="btn-refresh" class="btn btn-secondary">刷新页面信息</button>
      </div>
    </div>

    <div class="footer">
      Addfox Content UI 示例
    </div>
  </div>
</body>
</html>
