# Codecov config for generating the coverage badge
# Usage: in CI, run pnpm run test:coverage:report and upload coverage/lcov.info
# Example: codecov -f coverage/lcov.info

coverage:
  range: "70..100"
  round: down
  precision: 2
  status:
    project: default
    patch: default
    changes: false

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: false
